<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adobe A/C 管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 32px;
            padding: 40px 48px 48px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        /* 大標題 */
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #0a1e2f;
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .title span {
            display: inline-block;
            background: #0a1e2f;
            color: white;
            padding: 4px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* 三個按鈕 */
        .user-btn {
            width: 100%;
            padding: 20px 24px;
            margin-bottom: 16px;
            border: none;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f4f8;
            color: #1a2a3a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .user-btn:last-child {
            margin-bottom: 0;
        }

        .user-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .user-btn:active {
            transform: scale(0.98);
        }

        /* 狀態指示燈 */
        .status-dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 12px;
            transition: all 0.3s ease;
        }

        .status-dot.logged-in {
            background: #22c55e;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
        }

        .status-dot.logged-out {
            background: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
        }

        .status-text {
            font-size: 16px;
            font-weight: 500;
            opacity: 0.7;
        }

        .status-text.logged-in {
            color: #22c55e;
            opacity: 1;
        }

        .status-text.logged-out {
            color: #ef4444;
            opacity: 1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-name {
            font-size: 24px;
            font-weight: 600;
        }

        /* 右下角小提示 */
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        /* 預設狀態: 全部登出 */
        .btn-jacky .status-dot { background: #ef4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.3); }
        .btn-jacky .status-text { color: #ef4444; opacity: 1; }
        
        .btn-harold .status-dot { background: #ef4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.3); }
        .btn-harold .status-text { color: #ef4444; opacity: 1; }
        
        .btn-sion .status-dot { background: #ef4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.3); }
        .btn-sion .status-text { color: #ef4444; opacity: 1; }

        /* 模擬登入後的狀態 (點擊切換) */
        .btn-jacky.logged-in .status-dot { background: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4); }
        .btn-jacky.logged-in .status-text { color: #22c55e; opacity: 1; }

        .btn-harold.logged-in .status-dot { background: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4); }
        .btn-harold.logged-in .status-text { color: #22c55e; opacity: 1; }

        .btn-sion.logged-in .status-dot { background: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4); }
        .btn-sion.logged-in .status-text { color: #22c55e; opacity: 1; }

        /* 響應式 */
        @media (max-width: 480px) {
            .container {
                padding: 28px 20px 32px;
            }
            .title {
                font-size: 26px;
            }
            .user-btn {
                padding: 16px 20px;
                font-size: 20px;
            }
            .user-name {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 大標題 -->
        <div class="title">
            Adobe A/C
            <span>2 裝置</span>
        </div>

        <!-- Jacky 按鈕 -->
        <button class="user-btn btn-jacky" data-user="Jacky">
            <span class="user-info">
                <span class="user-name">👤 Jacky</span>
            </span>
            <span>
                <span class="status-dot"></span>
                <span class="status-text">Logged Out</span>
            </span>
        </button>

        <!-- Harold 按鈕 -->
        <button class="user-btn btn-harold" data-user="Harold">
            <span class="user-info">
                <span class="user-name">👤 Harold</span>
            </span>
            <span>
                <span class="status-dot"></span>
                <span class="status-text">Logged Out</span>
            </span>
        </button>

        <!-- Sion 按鈕 -->
        <button class="user-btn btn-sion" data-user="Sion">
            <span class="user-info">
                <span class="user-name">👤 Sion</span>
            </span>
            <span>
                <span class="status-dot"></span>
                <span class="status-text">Logged Out</span>
            </span>
        </button>

        <div class="footer">
            ⚡ 點擊切換登入/登出狀態 (離線示範)
        </div>
    </div>

    <script>
        // ============================================================
        // 離線示範: 點擊按鈕切換 Logged In / Logged Out
        // ============================================================
        const buttons = document.querySelectorAll('.user-btn');

        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                // 切換 logged-in class
                this.classList.toggle('logged-in');

                // 更新文字
                const statusText = this.querySelector('.status-text');
                if (this.classList.contains('logged-in')) {
                    statusText.textContent = 'Logged In';
                } else {
                    statusText.textContent = 'Logged Out';
                }
            });
        });
    </script>

</body>
</html>
