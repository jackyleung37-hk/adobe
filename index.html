<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adobe A/C 管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .container {
            width: 100%;
            height: 100vh;
            max-width: 600px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            padding: 12px 12px 12px 12px;
        }

        /* 大標題 */
        .title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-align: center;
            padding: 16px 0 14px 0;
            flex-shrink: 0;
            letter-spacing: 0.5px;
            background: #0a0a0a;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .title span {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: #aaa;
            padding: 2px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-left: 10px;
            vertical-align: middle;
        }

        /* 三個大按鈕 */
        .button-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0;
        }

        .user-btn {
            flex: 1;
            width: 100%;
            border: none;
            border-radius: 16px;
            font-size: 32px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px;
            color: white;
            background: #ef4444;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
            letter-spacing: 0.5px;
            min-height: 0;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .user-btn:active {
            transform: scale(0.96);
        }

        /* 登入狀態 - 綠色 */
        .user-btn.logged-in {
            background: #22c55e;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
        }

        /* 登出狀態 - 紅色 (預設) */
        .user-btn.logged-out {
            background: #ef4444;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
        }

        .user-name {
            font-size: 32px;
            font-weight: 700;
        }

        .user-status {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.9;
            letter-spacing: 0.3px;
        }

        /* 小提示 */
        .footer {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.15);
            padding: 10px 0 6px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* 響應式 */
        @media (max-width: 480px) {
            .container {
                padding: 8px 8px 8px 8px;
            }
            .title {
                font-size: 22px;
                padding: 12px 0 10px 0;
            }
            .title span {
                font-size: 12px;
                padding: 2px 10px;
                margin-left: 6px;
            }
            .user-btn {
                font-size: 24px;
                border-radius: 12px;
                padding: 0 18px;
            }
            .user-name {
                font-size: 24px;
            }
            .user-status {
                font-size: 15px;
            }
            .button-group {
                gap: 8px;
                padding: 6px 0;
            }
        }

        @media (max-height: 600px) {
            .title {
                font-size: 18px;
                padding: 8px 0 6px 0;
            }
            .title span {
                font-size: 10px;
                padding: 1px 8px;
            }
            .user-btn {
                font-size: 18px;
                border-radius: 10px;
                padding: 0 14px;
            }
            .user-name {
                font-size: 18px;
            }
            .user-status {
                font-size: 13px;
            }
            .button-group {
                gap: 6px;
                padding: 4px 0;
            }
            .footer {
                font-size: 10px;
                padding: 6px 0 2px 0;
            }
        }

        @media (max-height: 450px) {
            .user-btn {
                font-size: 14px;
                border-radius: 8px;
                padding: 0 10px;
            }
            .user-name {
                font-size: 14px;
            }
            .user-status {
                font-size: 11px;
            }
            .button-group {
                gap: 4px;
                padding: 2px 0;
            }
            .title {
                font-size: 14px;
                padding: 4px 0 4px 0;
            }
            .title span {
                font-size: 9px;
                padding: 1px 6px;
            }
            .footer {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 大標題 -->
        <div class="title">
            Adobe A/C
        </div>

        <!-- 三個大按鈕 -->
        <div class="button-group">
            <button class="user-btn logged-out" data-user="Jacky">
                <span class="user-name">👤 Jacky</span>
                <span class="user-status">Logged Out</span>
            </button>

            <button class="user-btn logged-out" data-user="Harold">
                <span class="user-name">👤 Harold</span>
                <span class="user-status">Logged Out</span>
            </button>

            <button class="user-btn logged-out" data-user="Sion">
                <span class="user-name">👤 Sion</span>
                <span class="user-status">Logged Out</span>
            </button>
        </div>

        <div class="footer">
            ● 點擊切換登入 / 登出
        </div>
    </div>

    <script>
        // ============================================================
        // 離線示範: 點擊按鈕切換顏色 (紅 ↔ 綠) + 更新文字
        // ============================================================
        const buttons = document.querySelectorAll('.user-btn');

        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                const statusText = this.querySelector('.user-status');
                
                if (this.classList.contains('logged-in')) {
                    // 切換到登出
                    this.classList.remove('logged-in');
                    this.classList.add('logged-out');
                    statusText.textContent = 'Logged Out';
                } else {
                    // 切換到登入
                    this.classList.remove('logged-out');
                    this.classList.add('logged-in');
                    statusText.textContent = 'Logged In';
                }
            });
        });
    </script>

</body>
</html>
